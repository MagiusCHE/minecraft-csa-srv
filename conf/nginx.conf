# Minecraft CustomSkinAPI server - nginx configuration
# Path on server: /var/www/html/minecraft-csa-srv
# Symlinked from: /etc/nginx/conf.d/magius.it.d/minecraft-csa-srv.conf

server {
    server_name minecraft.magius.it;

    include /etc/nginx/conf.d/magius.it.d/common.include;

    location /csa/ {
        proxy_pass http://127.0.0.1:8086/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    location = / {
        return 404;
    }
}
